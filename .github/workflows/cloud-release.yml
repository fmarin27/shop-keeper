name: Cloud Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish. Defaults to v<package version>."
        required: false
        type: string
      publish_play:
        description: "Upload the Android App Bundle to Google Play."
        required: false
        default: false
        type: boolean
      play_track:
        description: "Google Play track for manual uploads."
        required: false
        default: internal
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

permissions:
  contents: write

concurrency:
  group: cloud-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Read Release Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_code: ${{ steps.version.outputs.version_code }}
      release_tag: ${{ steps.version.outputs.release_tag }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Read package and Android versions
        id: version
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          version_code="$(node - <<'NODE'
          const fs = require('fs');
          const gradle = fs.readFileSync('android/app/build.gradle', 'utf8');
          const match = gradle.match(/versionCode\s+(\d+)/);
          if (!match) {
            throw new Error('Could not read Android versionCode');
          }
          console.log(match[1]);
          NODE
          )"
          release_tag="${{ inputs.release_tag }}"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            release_tag="${GITHUB_REF_NAME}"
          fi
          if [ -z "$release_tag" ]; then
            release_tag="v${version}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "version_code=${version_code}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"

  windows:
    name: Build Windows Updater
    runs-on: windows-latest
    needs: prepare
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist:win

      - name: Verify Windows updater metadata
        shell: pwsh
        run: |
          $version = "${{ needs.prepare.outputs.version }}"
          $installer = "release\Shop-Keeper-Setup-$version.exe"
          $blockmap = "$installer.blockmap"
          $latest = "release\latest.yml"
          if (!(Test-Path -LiteralPath $installer)) {
            throw "Missing Windows installer: $installer"
          }
          if (!(Test-Path -LiteralPath $blockmap)) {
            throw "Missing Windows blockmap: $blockmap"
          }
          if (!(Test-Path -LiteralPath $latest)) {
            throw "Missing updater metadata: $latest"
          }
          $latestText = Get-Content -LiteralPath $latest -Raw
          if ($latestText -notmatch [regex]::Escape("Shop-Keeper-Setup-$version.exe")) {
            throw "latest.yml does not point to Shop-Keeper-Setup-$version.exe"
          }

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            release/latest.yml
            release/Shop-Keeper-Setup-${{ needs.prepare.outputs.version }}.exe
            release/Shop-Keeper-Setup-${{ needs.prepare.outputs.version }}.exe.blockmap
          if-no-files-found: error

  android:
    name: Build Android Artifacts
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Restore Android signing files
        shell: bash
        run: |
          test -n "${ANDROID_KEYSTORE_BASE64}" || (echo "ANDROID_KEYSTORE_BASE64 is missing" && exit 1)
          test -n "${ANDROID_KEYSTORE_PROPERTIES_BASE64}" || (echo "ANDROID_KEYSTORE_PROPERTIES_BASE64 is missing" && exit 1)
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > android/app/shop-keeper-upload.jks
          echo "${ANDROID_KEYSTORE_PROPERTIES_BASE64}" | base64 --decode > android/keystore.properties
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PROPERTIES_BASE64: ${{ secrets.ANDROID_KEYSTORE_PROPERTIES_BASE64 }}

      - name: Sync Capacitor Android project
        run: npm run android:sync

      - name: Build signed Android bundle and APK
        working-directory: android
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease assembleRelease

      - name: Stage Android release artifacts
        shell: bash
        run: |
          version="${{ needs.prepare.outputs.version }}"
          version_code="${{ needs.prepare.outputs.version_code }}"
          mkdir -p release-android
          cp android/app/build/outputs/bundle/release/app-release.aab "release-android/ShopKeeper-${version}-${version_code}.aab"
          cp android/app/build/outputs/apk/release/app-release.apk "release-android/ShopKeeper-${version}-${version_code}.apk"

      - name: Upload Android release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: release-android/*
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - windows
      - android
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: windows-release

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: android-release

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: Shop Keeper ${{ needs.prepare.outputs.version }}
          make_latest: true
          files: |
            windows-release/latest.yml
            windows-release/Shop-Keeper-Setup-${{ needs.prepare.outputs.version }}.exe
            windows-release/Shop-Keeper-Setup-${{ needs.prepare.outputs.version }}.exe.blockmap
            android-release/ShopKeeper-${{ needs.prepare.outputs.version }}-${{ needs.prepare.outputs.version_code }}.aab
            android-release/ShopKeeper-${{ needs.prepare.outputs.version }}-${{ needs.prepare.outputs.version_code }}.apk

  play-store:
    name: Upload To Google Play
    runs-on: ubuntu-latest
    needs:
      - prepare
      - android
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_play }}
    steps:
      - name: Check Google Play credentials
        id: play_credentials
        shell: bash
        run: |
          if [ -z "${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "GOOGLE_PLAY_SERVICE_ACCOUNT_JSON is missing; skipping Play upload."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}

      - name: Download Android artifacts
        if: ${{ steps.play_credentials.outputs.available == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: android-release

      - name: Upload App Bundle to Google Play
        if: ${{ steps.play_credentials.outputs.available == 'true' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.shopkeeper.app
          releaseFiles: android-release/ShopKeeper-${{ needs.prepare.outputs.version }}-${{ needs.prepare.outputs.version_code }}.aab
          track: ${{ inputs.play_track }}
          status: completed
          releaseName: Shop Keeper ${{ needs.prepare.outputs.version }}
